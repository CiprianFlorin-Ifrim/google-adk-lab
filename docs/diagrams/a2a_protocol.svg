<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- ================================================================ -->
  <!-- Coordinator -->
  <!-- ================================================================ -->
  <rect x="40" y="140" width="220" height="140" fill="#5b9bd5" stroke="#333" stroke-width="2"/>
  <text x="150" y="175" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Coordinator</text>
  <text x="150" y="197" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">ADK or LangGraph</text>

  <rect x="55" y="215" width="190" height="25" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="150" y="232" text-anchor="middle" fill="#ccc" font-size="9" font-weight="bold">RemoteA2aAgent x3</text>

  <rect x="55" y="245" width="190" height="25" fill="#2d6a4f" stroke="#333" stroke-width="1"/>
  <text x="150" y="262" text-anchor="middle" fill="white" font-size="9" font-weight="bold">JSON-RPC client</text>

  <!-- ================================================================ -->
  <!-- Network boundary -->
  <!-- ================================================================ -->
  <line x1="350" y1="30" x2="350" y2="400" stroke="#888" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="350" y="20" text-anchor="middle" fill="#888" font-size="10" font-weight="bold">HTTP / network boundary</text>

  <!-- ================================================================ -->
  <!-- Tree connectors: Coordinator -> Agents -->
  <!-- ================================================================ -->

  <!-- Horizontal stem from coordinator -->
  <line x1="260" y1="210" x2="390" y2="210" stroke="#333" stroke-width="2"/>

  <!-- Vertical bar spanning all three agents -->
  <line x1="390" y1="75" x2="390" y2="345" stroke="#333" stroke-width="2"/>

  <!-- Horizontal branches to each agent -->
  <line x1="390" y1="75" x2="460" y2="75" stroke="#333" stroke-width="2"/>
  <polygon points="454,69 460,75 454,81" fill="#333"/>

  <line x1="390" y1="210" x2="460" y2="210" stroke="#333" stroke-width="2"/>
  <polygon points="454,204 460,210 454,216" fill="#333"/>

  <line x1="390" y1="345" x2="460" y2="345" stroke="#333" stroke-width="2"/>
  <polygon points="454,339 460,345 454,351" fill="#333"/>

  <!-- Branch labels -->
  <text x="425" y="66" text-anchor="middle" fill="#888" font-size="9" font-weight="bold">message/send</text>
  <text x="425" y="201" text-anchor="middle" fill="#888" font-size="9" font-weight="bold">message/send</text>
  <text x="425" y="336" text-anchor="middle" fill="#888" font-size="9" font-weight="bold">message/send</text>

  <!-- ================================================================ -->
  <!-- Remote A2A Agents -->
  <!-- ================================================================ -->

  <!-- Mortgage Agent (center y=75) -->
  <rect x="460" y="35" width="200" height="80" fill="#5b9bd5" stroke="#333" stroke-width="2"/>
  <text x="560" y="62" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Mortgage Agent</text>
  <text x="560" y="80" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">port 8001</text>
  <rect x="480" y="87" width="160" height="20" fill="#2d6a4f" stroke="#1a5c3a" stroke-width="1"/>
  <text x="560" y="101" text-anchor="middle" fill="white" font-size="9" font-weight="bold">MORTGAGE_TOOLS</text>

  <!-- Mortgage Agent Card (centered with agent: y=55 to y=95) -->
  <rect x="710" y="55" width="160" height="40" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
  <text x="790" y="73" text-anchor="middle" fill="#ccc" font-size="9" font-weight="bold">agent-card.json</text>
  <text x="790" y="87" text-anchor="middle" fill="#888" font-size="8" font-weight="bold">/.well-known/</text>
  <line x1="660" y1="75" x2="710" y2="75" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Risk Agent (center y=210) -->
  <rect x="460" y="170" width="200" height="80" fill="#5b9bd5" stroke="#333" stroke-width="2"/>
  <text x="560" y="197" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Risk Agent</text>
  <text x="560" y="215" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">port 8002</text>
  <rect x="480" y="222" width="160" height="20" fill="#2d6a4f" stroke="#1a5c3a" stroke-width="1"/>
  <text x="560" y="236" text-anchor="middle" fill="white" font-size="9" font-weight="bold">RISK_TOOLS</text>

  <!-- Risk Agent Card (centered with agent: y=190 to y=230) -->
  <rect x="710" y="190" width="160" height="40" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
  <text x="790" y="208" text-anchor="middle" fill="#ccc" font-size="9" font-weight="bold">agent-card.json</text>
  <text x="790" y="222" text-anchor="middle" fill="#888" font-size="8" font-weight="bold">/.well-known/</text>
  <line x1="660" y1="210" x2="710" y2="210" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Investment Agent (center y=345) -->
  <rect x="460" y="305" width="200" height="80" fill="#5b9bd5" stroke="#333" stroke-width="2"/>
  <text x="560" y="332" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Investment Agent</text>
  <text x="560" y="350" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">port 8003</text>
  <rect x="480" y="357" width="160" height="20" fill="#2d6a4f" stroke="#1a5c3a" stroke-width="1"/>
  <text x="560" y="371" text-anchor="middle" fill="white" font-size="9" font-weight="bold">INVESTMENT_TOOLS</text>

  <!-- Investment Agent Card (centered with agent: y=325 to y=365) -->
  <rect x="710" y="325" width="160" height="40" fill="#1a1a2e" stroke="#333" stroke-width="1.5"/>
  <text x="790" y="343" text-anchor="middle" fill="#ccc" font-size="9" font-weight="bold">agent-card.json</text>
  <text x="790" y="357" text-anchor="middle" fill="#888" font-size="8" font-weight="bold">/.well-known/</text>
  <line x1="660" y1="345" x2="710" y2="345" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

</svg>

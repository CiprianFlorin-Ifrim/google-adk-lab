<svg viewBox="0 0 1020 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- User Query -->
  <rect x="20" y="130" width="130" height="80" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <text x="85" y="162" text-anchor="middle" fill="white" font-size="13" font-weight="bold">User Query</text>
  <text x="85" y="185" text-anchor="middle" fill="#cccccc" font-size="11" font-weight="bold">text input</text>

  <!-- Line from User Query to fork point (no arrowhead) -->
  <line x1="150" y1="170" x2="255" y2="170" stroke="#333" stroke-width="2"/>

  <!-- SequentialAgent wrapper -->
  <rect x="220" y="25" width="600" height="300" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="520" y="18" text-anchor="middle" fill="#666" font-size="12" font-weight="bold">SequentialAgent</text>

  <!-- ParallelAgent wrapper -->
  <rect x="245" y="48" width="260" height="255" fill="none" stroke="#b07020" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="375" y="42" text-anchor="middle" fill="#b07020" font-size="11" font-weight="bold">ParallelAgent</text>

  <!-- Agent A (top) -->
  <rect x="265" y="65" width="220" height="100" fill="#5b9bd5" stroke="#333" stroke-width="2"/>
  <text x="375" y="97" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Agent A</text>
  <text x="375" y="119" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">eligibility check</text>
  <rect x="290" y="130" width="170" height="25" fill="#2d6a4f" stroke="#1a5c3a" stroke-width="1.5"/>
  <text x="375" y="148" text-anchor="middle" fill="white" font-size="10" font-weight="bold">LOAN_TOOLS</text>

  <!-- Agent B (bottom) -->
  <rect x="265" y="185" width="220" height="100" fill="#5b9bd5" stroke="#333" stroke-width="2"/>
  <text x="375" y="217" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Agent B</text>
  <text x="375" y="239" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">investment projection</text>
  <rect x="290" y="250" width="170" height="25" fill="#2d6a4f" stroke="#1a5c3a" stroke-width="1.5"/>
  <text x="375" y="268" text-anchor="middle" fill="white" font-size="10" font-weight="bold">INVESTMENT_TOOLS</text>

  <!-- Fork to Agent A -->
  <line x1="255" y1="170" x2="255" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="255" y1="110" x2="265" y2="110" stroke="#333" stroke-width="2"/>
  <polygon points="259,104 265,110 259,116" fill="#333"/>

  <!-- Fork to Agent B -->
  <line x1="255" y1="170" x2="255" y2="230" stroke="#333" stroke-width="2"/>
  <line x1="255" y1="230" x2="265" y2="230" stroke="#333" stroke-width="2"/>
  <polygon points="259,224 265,230 259,236" fill="#333"/>

  <!-- Arrow A -> join point -->
  <line x1="485" y1="110" x2="560" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="560" y1="110" x2="560" y2="148" stroke="#333" stroke-width="2"/>
  <line x1="560" y1="148" x2="590" y2="148" stroke="#333" stroke-width="2"/>
  <polygon points="584,142 590,148 584,154" fill="#333"/>

  <!-- Arrow B -> join point -->
  <line x1="485" y1="230" x2="560" y2="230" stroke="#333" stroke-width="2"/>
  <line x1="560" y1="230" x2="560" y2="192" stroke="#333" stroke-width="2"/>
  <line x1="560" y1="192" x2="590" y2="192" stroke="#333" stroke-width="2"/>
  <polygon points="584,186 590,192 584,198" fill="#333"/>

  <!-- State labels -->
  <text x="510" y="100" text-anchor="start" fill="#e07a3a" font-size="10" font-weight="bold">state["a"]</text>
  <text x="510" y="245" text-anchor="start" fill="#e07a3a" font-size="10" font-weight="bold">state["b"]</text>

  <!-- Synthesiser -->
  <rect x="590" y="120" width="210" height="100" fill="#5b9bd5" stroke="#333" stroke-width="2"/>
  <text x="695" y="158" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Synthesiser</text>
  <text x="695" y="182" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">reads both results</text>

  <!-- Arrow out -->
  <line x1="800" y1="170" x2="855" y2="170" stroke="#333" stroke-width="2"/>
  <polygon points="855,164 870,170 855,176" fill="#333"/>

  <!-- Response -->
  <rect x="870" y="130" width="130" height="80" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <text x="935" y="162" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Response</text>
  <text x="935" y="185" text-anchor="middle" fill="#cccccc" font-size="11" font-weight="bold">final answer</text>

</svg>

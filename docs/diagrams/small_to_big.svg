<svg viewBox="0 0 820 310" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <!-- ================================================================ -->
  <!-- Top row: User Query -> Triage -> Response (all aligned) -->
  <!-- ================================================================ -->

  <!-- User Query -->
  <rect x="30" y="40" width="150" height="80" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <text x="105" y="72" text-anchor="middle" fill="white" font-size="13" font-weight="bold">User Query</text>
  <text x="105" y="95" text-anchor="middle" fill="#cccccc" font-size="11" font-weight="bold">text input</text>

  <!-- Arrow to Triage -->
  <line x1="180" y1="80" x2="270" y2="80" stroke="#333" stroke-width="2"/>
  <polygon points="264,74 270,80 264,86" fill="#333"/>

  <!-- Triage Agent -->
  <rect x="270" y="40" width="200" height="80" fill="#2d6a4f" stroke="#333" stroke-width="2"/>
  <text x="370" y="68" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Triage Agent</text>
  <text x="370" y="88" text-anchor="middle" fill="#1a1a1a" font-size="11" font-weight="bold">gemini-3.1-flash-lite</text>
  <text x="370" y="108" text-anchor="middle" fill="#c0dcc0" font-size="10" font-weight="bold">fast, low cost</text>

  <!-- Arrow to Response -->
  <line x1="470" y1="80" x2="570" y2="80" stroke="#333" stroke-width="2"/>
  <polygon points="564,74 570,80 564,86" fill="#333"/>


  <!-- Response -->
  <rect x="570" y="40" width="150" height="80" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <text x="645" y="72" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Response</text>
  <text x="645" y="95" text-anchor="middle" fill="#cccccc" font-size="11" font-weight="bold">final answer</text>

  <!-- ================================================================ -->
  <!-- Complex path: down to big model, back up -->
  <!-- ================================================================ -->

  <!-- Arrow down from Triage to Complex Analyst -->
  <line x1="340" y1="120" x2="340" y2="190" stroke="#333" stroke-width="2"/>
  <polygon points="334,184 340,190 346,184" fill="#333"/>
  <text x="322" y="158" text-anchor="end" fill="#e07a3a" font-size="10" font-weight="bold">query</text>

  <!-- Complex Analyst -->
  <rect x="270" y="190" width="200" height="80" fill="#5b9bd5" stroke="#333" stroke-width="2"/>
  <text x="370" y="218" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Complex Analyst</text>
  <text x="370" y="238" text-anchor="middle" fill="#1a3a5c" font-size="11" font-weight="bold">gemini-3-flash</text>
  <text x="370" y="258" text-anchor="middle" fill="#3a6a9c" font-size="10" font-weight="bold">deeper reasoning</text>

  <!-- Arrow back up from Complex Analyst to Triage -->
  <line x1="400" y1="190" x2="400" y2="120" stroke="#333" stroke-width="2"/>
  <polygon points="394,126 400,120 406,126" fill="#333"/>
  <text x="418" y="158" text-anchor="start" fill="#e07a3a" font-size="10" font-weight="bold">result</text>

</svg>
